name: 王海滢自行发布专用Actions

on:
  push:
    branches: [dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Debug build output
        run: ls -la dist/ || echo "dist not found"

      - name: Deploy dist to main branch
        run: |
          set -e
          # 配置 Git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 备份 dist 到临时目录
          mkdir -p /tmp/dist
          if [ -d "dist" ]; then
            cp -r dist/* /tmp/dist/ || true
            echo "Backed up dist to /tmp/dist"
          else
            echo "dist not found - failing"
            exit 1
          fi

          # 清理本地变更
          rm -rf dist/
          git clean -fd || true

          # 检出 main 分支
          git fetch origin
          git checkout main || git checkout -b main
          echo "Switched to main branch"

          # 清理 main 根目录（保留 .git）
          git rm -rf . --ignore-unmatch || true
          git clean -fdx -e .git || true
          echo "Cleaned main directory"

          # 从临时目录复制 dist 内容到 main 根目录
          if [ -d "/tmp/dist" ] && [ "$(ls -A /tmp/dist)" ]; then
            cp -r /tmp/dist/* . || true
            # 关键修复：添加 .nojekyll 文件防止 Jekyll 忽略资源文件
            touch .nojekyll
            echo "Copied dist contents and created .nojekyll"
          else
            echo "No dist contents to copy - failing"
            exit 1
          fi

          # 提交并推送
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dist from dev build [skip ci]"
            git push origin main
            echo "Pushed changes to main"
          fi

          # 清理临时目录
          rm -rf /tmp/dist